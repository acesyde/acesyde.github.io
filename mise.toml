[tools]
node = "24"
pnpm = "latest"

[tasks.install]
description = "Install dependencies"
run = "pnpm install"

[tasks.dev]
description = "Start the dev server"
run = "pnpm dev"

[tasks.build]
description = "Build the site (astro check + build + pagefind)"
run = "pnpm build"

[tasks.preview]
description = "Preview the production build"
run = "pnpm preview"
